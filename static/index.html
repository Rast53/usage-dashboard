<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мои подписки · raclaw</title>
<style>
  :root {
    --bg: #0b0f14;
    --card: #121821;
    --border: #243041;
    --text: #e6edf3;
    --muted: #8b9bb0;
    --accent: #6cb6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --chip: #1a2330;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, #152033 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 20px 48px; }

  /* Header */
  header {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 26px; letter-spacing: -0.03em; }
  .sub { color: var(--muted); margin-top: 4px; font-size: 13px; }
  button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 16px; cursor: pointer; font-size: 14px;
    transition: border-color 0.15s;
  }
  button:hover { border-color: var(--accent); }

  /* Error banner */
  .err {
    background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.25);
    color: #ffb4af; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px;
  }

  /* Stats row */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 22px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
  }
  .stat-card.critical { border-color: rgba(248,81,73,0.4); }
  .stat-k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-v { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.03em; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Section label */
  .section-label {
    color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.04em; margin: 0 0 10px;
  }

  /* Card grid */
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px; margin-bottom: 22px;
  }

  /* Provider/account cards */
  .pcard {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    transition: border-color 0.15s;
  }
  .pcard.critical { border-color: rgba(248,81,73,0.45); }
  .pcard.warn { border-color: rgba(210,153,34,0.45); }
  .pcard.ok { border-color: var(--border); }

  .pcard-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .pcard-title { font-weight: 650; font-size: 14px; letter-spacing: -0.01em; }

  .badge {
    display: inline-block; border-radius: 999px; padding: 2px 10px;
    font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  }
  .badge.ok { color: var(--green); border-color: rgba(63,185,80,0.35); background: rgba(63,185,80,0.08); }
  .badge.warn { color: var(--yellow); border-color: rgba(210,153,34,0.35); background: rgba(210,153,34,0.08); }
  .badge.bad { color: var(--red); border-color: rgba(248,81,73,0.35); background: rgba(248,81,73,0.08); }

  .muted { color: var(--muted); }
  .ok-text { color: var(--green); }
  .bad-text { color: var(--red); }
  .warn-text { color: var(--yellow); }

  /* Limit rows (Z.AI dual limits) */
  .limit-row { margin-bottom: 8px; }
  .limit-row-head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .limit-label { font-size: 11px; color: var(--muted); }
  .limit-val { font-size: 16px; font-weight: 700; }

  /* Progress bar */
  .bar {
    height: 5px; background: #1b2430; border-radius: 999px; overflow: hidden;
    margin: 4px 0;
  }
  .bar > span { display: block; height: 100%; border-radius: 999px; }
  .bar.ok > span { background: linear-gradient(90deg, #3fb950, #6cb6ff); }
  .bar.warn > span { background: #d29922; }
  .bar.bad > span { background: linear-gradient(90deg, #f85149, #ff7b72); }
  .bar-sub { font-size: 11px; color: var(--muted); }

  /* Sparkline */
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
  .spark i {
    display: block; width: 4px; border-radius: 2px 2px 0 0;
    background: #3d4f66; min-height: 2px;
  }
  .spark i.fail { background: var(--red); }
  .spark i.peak { background: var(--accent); }

  /* Model chips */
  .model-chip {
    display: inline-block; background: var(--chip); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 8px; margin: 0 4px 4px 0; font-size: 11px; color: #b7c6d8;
  }

  /* Details toggle */
  .details-toggle {
    font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 10px;
    border-top: 1px solid var(--border); padding-top: 8px;
    user-select: none;
  }
  .details-toggle:hover { color: #8ec8ff; }
  .details-body { display: none; margin-top: 10px; }
  .pcard[data-expanded="true"] .details-body { display: block; }
  .pcard[data-expanded="true"] .details-toggle::before { content: '▴ свернуть'; }
  .pcard[data-expanded="false"] .details-toggle::before { content: '▾ детали'; }

  .details-section {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.04em; margin: 10px 0 6px;
  }
  .details-row {
    display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px;
  }
  .details-mono {
    font-size: 11px; color: #b7c6d8; line-height: 1.7;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .details-src {
    font-size: 10px; color: #3d4f66; margin-top: 8px;
  }

  /* Mobile */
  @media (max-width: 720px) {
    .wrap { padding: 18px 12px 36px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .card-grid { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Мои подписки</h1>
        <div class="sub" id="updated">обновлено: —</div>
      </div>
      <button onclick="refresh()">Обновить</button>
    </header>

    <div id="errors"></div>
    <div class="stats" id="stats"></div>

    <div class="section-label">Провайдеры</div>
    <div class="card-grid" id="providers"></div>

    <div class="section-label">Аккаунты xAI / Codex</div>
    <div class="card-grid" id="accounts"></div>
  </div>

<script>
/* ── Utilities ── */
function fmt(n) {
  if (n == null || n === '') return '—';
  const x = Number(n);
  if (Number.isNaN(x)) return String(n);
  return x.toLocaleString('ru-RU');
}
function pad(n) { return String(n).padStart(2, '0'); }
function parseDate(v) {
  if (!v) return null;
  const d = new Date(v);
  return Number.isNaN(d.getTime()) ? null : d;
}
function fmtDateShort(v) {
  const d = parseDate(v);
  if (!d) return v || '—';
  return pad(d.getUTCDate()) + '.' + pad(d.getUTCMonth()+1) + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ' UTC';
}
function fmtDateTime(v) {
  const d = parseDate(v);
  if (!d) return v || '—';
  return pad(d.getUTCDate()) + '.' + pad(d.getUTCMonth()+1) + '.' + d.getUTCFullYear() + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ' UTC';
}
function fmtRelative(v) {
  const d = parseDate(v);
  if (!d) return '';
  const ms = d.getTime() - Date.now();
  const abs = Math.abs(ms);
  const min = Math.round(abs / 60000);
  if (min < 60) return ms >= 0 ? ('через ' + min + ' мин') : (min + ' мин назад');
  const h = Math.round(min / 60);
  if (h < 48) return ms >= 0 ? ('через ' + h + ' ч') : (h + ' ч назад');
  const days = Math.round(h / 24);
  return ms >= 0 ? ('через ' + days + ' дн') : (days + ' дн назад');
}
function money(v, digits) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (Number.isNaN(n)) return String(v);
  return n.toLocaleString('ru-RU', { minimumFractionDigits: digits||2, maximumFractionDigits: digits||2 });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Classify: returns 'critical' | 'warn' | 'ok' ── */
function classify(item) {
  // CPA account
  if (item.provider && item.provider !== 'zai' && item.provider !== 'deepseek' && item.provider !== 'openrouter') {
    const q = item.quota || {};
    const credits = q.credits || {};
    if (item.unavailable || q.team_blocked || (credits.used_percent != null && credits.used_percent >= 100)) {
      return 'critical';
    }
    const rem = credits.remaining_percent;
    if (rem != null && rem <= 40) return 'warn';
    return 'ok';
  }
  // Z.AI wallet
  if (item.provider === 'zai' || item.kind === 'coding-quota') {
    if (!item.ok) return 'critical';
    const sess = item.session || {};
    const week = item.weekly || {};
    const sessRem = sess.remaining_percent;
    const weekRem = week.remaining_percent;
    let worst = 'ok';
    if (sessRem != null && sessRem <= 0) worst = 'critical';
    else if (weekRem != null && weekRem <= 0) worst = 'critical';
    else if (sessRem != null && sessRem <= 40) worst = 'warn';
    else if (weekRem != null && weekRem <= 40) worst = 'warn';
    return worst;
  }
  // DeepSeek wallet
  if (item.provider === 'deepseek' || item.kind === 'wallet-balance') {
    if (!item.ok || !item.is_available) return 'critical';
    const cny = (item.balance || []).find(function(b){ return b.currency === 'CNY'; });
    if (cny && cny.total_balance != null) {
      const bal = Number(cny.total_balance);
      if (bal < 5) return 'critical';
      if (bal < 20) return 'warn';
    }
    return 'ok';
  }
  // OpenRouter wallet
  if (item.provider === 'openrouter' || item.kind === 'wallet-credits') {
    if (!item.ok) return 'critical';
    const rem = item.remaining;
    if (rem != null) {
      if (rem < 0.5) return 'critical';
      if (rem < 2) return 'warn';
    }
    return 'ok';
  }
  return 'ok';
}

/* ── Sparkline ── */
function sparkline(arr) {
  if (!arr || !arr.length) return '<span class="muted">—</span>';
  const vals = arr.map(function(x) { return Number(x.success || 0) + Number(x.failed || 0); });
  const max = Math.max(1, ...vals);
  const last = vals.length - 1;
  return '<div class="spark">' + arr.slice(-24).map(function(x, i) {
    const total = Number(x.success || 0) + Number(x.failed || 0);
    const h = Math.max(2, Math.round(28 * total / max));
    const cls = (x.failed || 0) > 0 ? 'fail' : (i === last ? 'peak' : '');
    const title = (x.time || '') + ': ok ' + (x.success || 0) + ', fail ' + (x.failed || 0);
    return '<i class="' + cls + '" style="height:' + h + 'px" title="' + escapeHtml(title) + '"></i>';
  }).join('') + '</div>';
}

/* ── Toggle details ── */
function toggleDetails(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const expanded = el.getAttribute('data-expanded') === 'true';
  el.setAttribute('data-expanded', expanded ? 'false' : 'true');
}

/* ── Z.AI card ── */
function renderZaiCard(w) {
  if (!w) return '';
  const st = classify(w);
  const sess = w.session || {};
  const week = w.weekly || {};
  const mcp = w.mcp || {};
  const level = w.level || '?';
  const badge = w.ok
    ? '<span class="badge ' + (st === 'critical' ? 'bad' : st === 'warn' ? 'warn' : 'ok') + '">plan ' + escapeHtml(level) + '</span>'
    : '<span class="badge bad">error</span>';

  function limitRow(label, lim, idPrefix) {
    if (!lim || lim.remaining_percent == null) {
      return '<div class="limit-row"><div class="limit-row-head"><span class="limit-label">' + label + '</span><span class="limit-val muted">—</span></div></div>';
    }
    const rem = lim.remaining_percent;
    const used = lim.used_percent;
    const cls = rem <= 0 ? 'bad' : rem <= 40 ? 'warn' : 'ok';
    const width = Math.max(0, Math.min(100, rem));
    const resetRel = lim.next_reset_at ? fmtRelative(lim.next_reset_at) : '';
    const resetLine = lim.next_reset_at
      ? ('сброс ' + fmtDateShort(lim.next_reset_at) + (resetRel ? ' · ' + resetRel : ''))
      : '';
    return '<div class="limit-row">' +
      '<div class="limit-row-head"><span class="limit-label">' + label + '</span><span class="limit-val ' + (cls === 'bad' ? 'bad-text' : cls === 'warn' ? 'warn-text' : '') + '">' + rem + '%</span></div>' +
      '<div class="bar ' + cls + '"><span style="width:' + width + '%"></span></div>' +
      (used != null ? '<div class="bar-sub">used ' + used + '%</div>' : '') +
      (resetLine ? '<div class="bar-sub">' + resetLine + '</div>' : '') +
    '</div>';
  }

  const cardId = 'zai-card';

  // Details block
  const mcpCur = mcp.currentValue != null ? mcp.currentValue : '—';
  const mcpLim = mcp.usage != null ? mcp.usage : '—';
  const mcpRem = mcp.remaining != null ? mcp.remaining : '—';
  const mcpReset = mcp.next_reset_at ? (fmtDateShort(mcp.next_reset_at) + ' · ' + fmtRelative(mcp.next_reset_at)) : '—';

  // exact token values from limits
  const sessLim = (w.limits || []).find(function(l){ return l.kind === 'session'; }) || {};
  const weekLim = (w.limits || []).find(function(l){ return l.kind === 'weekly'; }) || {};
  const mcpLimRaw = (w.limits || []).find(function(l){ return l.kind === 'mcp'; }) || {};

  function exactVal(lim) {
    const num = lim.number != null ? fmt(lim.number) : '—';
    const usage = lim.currentValue != null ? fmt(lim.currentValue) : '—';
    const unit = lim.unit || '';
    return usage + ' / ' + num + ' ' + escapeHtml(unit);
  }

  const details =
    '<div class="details-body">' +
      '<div class="details-section">MCP инструменты</div>' +
      '<div class="details-row"><span>использовано</span><span><b>' + escapeHtml(String(mcpCur)) + '</b> / ' + escapeHtml(String(mcpLim)) + '</span></div>' +
      '<div class="details-row"><span>осталось</span><span>' + escapeHtml(String(mcpRem)) + '</span></div>' +
      '<div class="details-row"><span>сброс</span><span class="muted">' + mcpReset + '</span></div>' +
      '<div class="details-section">Точные значения</div>' +
      '<div class="details-mono">' +
        'short: ' + exactVal(sessLim) + '<br>' +
        'week: ' + exactVal(weekLim) + '<br>' +
        'mcp: ' + exactVal(mcpLimRaw) + '<br>' +
        (sessLim.summary ? ('summary: ' + escapeHtml(sessLim.summary)) : '') +
      '</div>' +
      '<div class="details-src">источник: /api/monitor/usage/quota/limit</div>' +
      (w.error ? '<div class="details-src bad-text">' + escapeHtml(w.error) + '</div>' : '') +
    '</div>';

  return '<div class="pcard ' + st + '" id="' + cardId + '" data-expanded="false">' +
    '<div class="pcard-head"><span class="pcard-title">Z.AI · GLM Coding</span>' + badge + '</div>' +
    limitRow('короткий (5ч)', sess) +
    limitRow('недельный', week) +
    '<div class="bar-sub">MCP ' + escapeHtml(String(mcpCur)) + '/' + escapeHtml(String(mcpLim)) + '</div>' +
    details +
    '<div class="details-toggle" onclick="toggleDetails(\'' + cardId + '\')"></div>' +
  '</div>';
}

/* ── Provider card stubs (Tasks 4–5) ── */
function renderDeepseekCard(w) {
  if (!w) return '';
  const st = classify(w);
  const bals = w.balance || [];
  const cny = bals.find(function(b){ return b.currency === 'CNY'; }) || {};
  const usd = bals.find(function(b){ return b.currency === 'USD'; }) || {};
  const mainBal = (cny.total_balance != null)
    ? ('¥' + Number(cny.total_balance).toFixed(2))
    : ((usd.total_balance != null) ? ('$' + Number(usd.total_balance).toFixed(2)) : '—');
  const avail = w.is_available ? '<span class="ok-text">available</span>' : '<span class="bad-text">unavailable</span>';
  const badge = w.ok ? '<span class="badge ok">OK</span>' : '<span class="badge bad">ERR</span>';

  const spend = w.spend_24h || {};
  const spent = spend.spent != null ? ('¥' + money(spend.spent)) : (spend.spent_summary || '—');
  const baseAt = spend.baseline_at ? ('база ' + fmtDateShort(spend.baseline_at)) : '';

  const cardId = 'deepseek-card';

  // Details
  let balDetails = '';
  bals.forEach(function(b) {
    const sym = b.currency === 'CNY' ? '¥' : '$';
    balDetails += '<div class="details-row"><span>' + escapeHtml(b.currency || '') + ' баланс</span><span><b>' + sym + Number(b.total_balance || 0).toFixed(2) + '</b></span></div>';
    balDetails += '<div class="details-row"><span>topped up</span><span class="muted">' + sym + Number(b.topped_up_balance || 0).toFixed(2) + '</span></div>';
  });

  const details =
    '<div class="details-body">' +
      '<div class="details-section">Балансы</div>' +
      (balDetails || '<div class="details-row muted">нет данных</div>') +
      '<div class="details-section">Расход 24ч</div>' +
      '<div class="details-row"><span>потрачено</span><span><b>' + escapeHtml(String(spent)) + '</b></span></div>' +
      (baseAt ? '<div class="details-row"><span>baseline</span><span class="muted">' + baseAt + '</span></div>' : '') +
      (spend.partial ? '<div class="details-row"><span>статус</span><span class="warn-text">partial</span></div>' : '') +
      '<div class="details-section">Статус</div>' +
      '<div class="details-row"><span>доступен</span><span>' + avail + '</span></div>' +
      (w.remaining_summary ? '<div class="details-mono">' + escapeHtml(w.remaining_summary) + '</div>' : '') +
      '<div class="details-src">источник: api.deepseek.com/user/balance + snapshots.jsonl</div>' +
      (w.error ? '<div class="details-src bad-text">' + escapeHtml(w.error) + '</div>' : '') +
    '</div>';

  return '<div class="pcard ' + st + '" id="' + cardId + '" data-expanded="false">' +
    '<div class="pcard-head"><span class="pcard-title">DeepSeek · баланс</span>' + badge + '</div>' +
    '<div class="limit-row"><div class="limit-row-head"><span class="limit-label">баланс</span><span class="limit-val">' + mainBal + '</span></div></div>' +
    (cny.topped_up_balance != null ? '<div class="bar-sub">topped ¥' + Number(cny.topped_up_balance).toFixed(2) + '</div>' : '') +
    '<div class="limit-row" style="margin-top:8px"><div class="limit-row-head"><span class="limit-label">расход 24ч</span><span class="limit-val">' + escapeHtml(String(spent)) + '</span></div></div>' +
    (baseAt ? '<div class="bar-sub">' + baseAt + (spend.partial ? ' · partial' : '') + '</div>' : '') +
    details +
    '<div class="details-toggle" onclick="toggleDetails(\'' + cardId + '\')"></div>' +
  '</div>';
}
function renderOpenrouterCard(w) {
  if (!w) return '';
  const st = classify(w);
  const rem = w.remaining;
  const total = w.total_credits;
  const used = w.total_usage;
  const mainBal = (rem != null) ? ('$' + money(rem)) : '—';
  const badge = w.ok ? '<span class="badge ok">OK</span>' : '<span class="badge bad">ERR</span>';

  const spend = w.spend_24h || {};
  const spent = w.spent_summary || spend.spent_summary || '—';
  const daily = w.usage_daily;
  const weekly = w.usage_weekly;
  const monthly = w.usage_monthly;
  const dailyAll = w.usage_daily_all_keys != null ? w.usage_daily_all_keys : daily;

  // progress bar: used/total
  let progressBar = '';
  if (total != null && used != null && total > 0) {
    const pct = Math.max(0, Math.min(100, (used / total) * 100));
    const remPct = 100 - pct;
    const cls = remPct <= 0 ? 'bad' : remPct <= 40 ? 'warn' : 'ok';
    progressBar = '<div class="bar ' + cls + '"><span style="width:' + remPct + '%"></span></div>';
  }

  const cardId = 'openrouter-card';

  // Details: key breakdown
  const keys = w.keys || [];
  let keysHtml = '';
  if (keys.length) {
    keysHtml = keys.slice(0, 8).map(function(k) {
      return '<div class="details-row"><span>' + escapeHtml(k.name || k.label || '?') + '</span><span>$' + money(k.usage_daily || 0) + ' today</span></div>';
    }).join('');
  }

  const details =
    '<div class="details-body">' +
      '<div class="details-section">Кредиты</div>' +
      '<div class="details-row"><span>остаток</span><span><b>$' + money(rem) + '</b></span></div>' +
      '<div class="details-row"><span>использовано</span><span class="muted">$' + money(used) + ' / $' + money(total) + '</span></div>' +
      '<div class="details-section">Расход</div>' +
      '<div class="details-row"><span>24ч (snapshots)</span><span>' + escapeHtml(String(spent)) + '</span></div>' +
      '<div class="details-row"><span>сегодня (all keys)</span><span>$' + money(dailyAll) + '</span></div>' +
      '<div class="details-row"><span>сегодня (this key)</span><span>$' + money(daily) + '</span></div>' +
      '<div class="details-row"><span>неделя</span><span>$' + money(weekly) + '</span></div>' +
      '<div class="details-row"><span>месяц</span><span>$' + money(monthly) + '</span></div>' +
      (spend.baseline_at ? '<div class="details-row"><span>baseline</span><span class="muted">' + fmtDateShort(spend.baseline_at) + (spend.partial ? ' · partial' : '') + '</span></div>' : '') +
      (keysHtml ? '<div class="details-section">Ключи</div>' + keysHtml : '') +
      '<div class="details-src">источник: /api/v1/credits + /api/v1/key</div>' +
      (w.error ? '<div class="details-src bad-text">' + escapeHtml(w.error) + '</div>' : '') +
    '</div>';

  return '<div class="pcard ' + st + '" id="' + cardId + '" data-expanded="false">' +
    '<div class="pcard-head"><span class="pcard-title">OpenRouter · credits</span>' + badge + '</div>' +
    '<div class="limit-row"><div class="limit-row-head"><span class="limit-label">остаток</span><span class="limit-val">' + mainBal + '</span></div></div>' +
    (used != null && total != null ? '<div class="bar-sub">used $' + money(used) + ' / $' + money(total) + '</div>' : '') +
    progressBar +
    '<div class="limit-row" style="margin-top:8px"><div class="limit-row-head"><span class="limit-label">расход 24ч</span><span class="limit-val">' + escapeHtml(String(spent)) + '</span></div></div>' +
    '<div class="bar-sub">week $' + money(weekly) + ' · month $' + money(monthly) + '</div>' +
    details +
    '<div class="details-toggle" onclick="toggleDetails(\'' + cardId + '\')"></div>' +
  '</div>';
}

/* ── CPA account card ── */
function renderAccountCard(a) {
  const st = classify(a);
  const q = a.quota || {};
  const credits = q.credits || {};
  const isBlocked = a.unavailable || q.team_blocked || (credits.used_percent != null && credits.used_percent >= 100);

  // Status text
  let statusText, statusCls;
  if (isBlocked) {
    statusText = 'заблокирован';
    statusCls = 'bad-text';
  } else if (a.disabled) {
    statusText = 'отключён';
    statusCls = 'muted';
  } else if (a.unavailable) {
    statusText = 'недоступен';
    statusCls = 'bad-text';
  } else if (a.status === 'active') {
    statusText = 'активен';
    statusCls = 'ok-text';
  } else {
    statusText = a.status || '?';
    statusCls = 'muted';
  }

  // Blocked reason
  function humanReason(q) {
    const raw = String(q.blocked_reason || '').toLowerCase();
    if (!raw) return '';
    if (raw.includes('credit pool exhausted') || raw.includes('100%')) return 'пул кредитов исчерпан';
    if (raw.includes('spending-limit') || raw.includes('run out of credits')) return 'лимит трат / кредиты кончились';
    if (raw.includes('team_blocked')) return 'team blocked';
    return '';
  }
  const reason = humanReason(q);

  // Percentage badge
  let badge;
  if (isBlocked) {
    badge = '<span class="badge bad">0%</span>';
  } else if (credits.remaining_percent != null) {
    const rem = credits.remaining_percent;
    const bCls = rem <= 40 ? 'warn' : 'ok';
    badge = '<span class="badge ' + bCls + '">' + rem + '%</span>';
  } else {
    badge = '<span class="badge ok">OK</span>';
  }

  // Reset info
  const resetAt = q.reset_summary || credits.period_end || a.next_retry_after;
  const resetRel = resetAt ? fmtRelative(resetAt) : '';
  let resetLine = '';
  if (isBlocked && reason) {
    resetLine = reason;
  } else if (resetAt) {
    resetLine = 'сброс ' + fmtDateShort(resetAt) + (resetRel ? ' · ' + resetRel : '');
  }

  // Progress bar
  let progressBar = '';
  if (credits.remaining_percent != null) {
    const rem = credits.remaining_percent;
    const cls = rem <= 0 ? 'bad' : rem <= 40 ? 'warn' : 'ok';
    const width = Math.max(0, Math.min(100, rem));
    progressBar = '<div class="bar ' + cls + '"><span style="width:' + width + '%"></span></div>';
  }

  // Title: email or name
  const title = a.email || a.name || a.account_type || 'unknown';
  const sub = [a.account_type || '', a.last_seen ? ('last ' + fmtDateShort(a.last_seen)) : ''].filter(Boolean).join(' · ');

  // Models (chips, first 4)
  let modelsHtml = '<span class="muted">—</span>';
  if ((a.models || []).length) {
    modelsHtml = (a.models || []).slice(0, 4).map(function(m) {
      const ms = (a.model_stats || []).find(function(x){ return x.model === m; });
      const chipTitle = ms ? (m + ': ' + ms.requests + ' req, ' + fmt(ms.tokens_total) + ' tok') : m;
      return '<span class="model-chip" title="' + escapeHtml(chipTitle) + '">' + escapeHtml(m) + '</span>';
    }).join('');
  }

  const cardId = 'acct-' + (a.email || a.name || Math.random().toString(36).slice(2)).replace(/[^a-zA-Z0-9]/g, '_');

  // Details
  const tokIn = a.tokens_in || 0;
  const tokOut = a.tokens_out || 0;
  const tokTotal = a.tokens_total || 0;

  let modelStatsHtml = '';
  (a.model_stats || []).slice(0, 8).forEach(function(ms) {
    modelStatsHtml += '<div class="details-row"><span>' + escapeHtml(ms.model || '?') + '</span><span class="muted">' + (ms.requests || 0) + ' req · ' + fmt(ms.tokens_total) + ' tok</span></div>';
  });

  const details =
    '<div class="details-body">' +
      '<div class="details-section">Токены 24ч</div>' +
      '<div class="details-row"><span>входящие</span><span><b>' + fmt(tokIn) + '</b></span></div>' +
      '<div class="details-row"><span>исходящие</span><span><b>' + fmt(tokOut) + '</b></span></div>' +
      '<div class="details-row"><span>всего</span><span><b>' + fmt(tokTotal) + '</b></span></div>' +
      (a.reasoning_tokens ? '<div class="details-row"><span>reasoning</span><span class="muted">' + fmt(a.reasoning_tokens) + '</span></div>' : '') +
      (a.cached_tokens ? '<div class="details-row"><span>cached</span><span class="muted">' + fmt(a.cached_tokens) + '</span></div>' : '') +
      '<div class="details-section">Модели</div>' +
      (modelStatsHtml || '<div class="details-row muted">нет данных</div>') +
      '<div class="details-section">Запросы</div>' +
      sparkline(a.recent_requests) +
      '<div class="details-section">Квота</div>' +
      '<div class="details-mono">' +
        (credits.remaining_percent != null ? ('credits: ' + credits.remaining_percent + '% осталось') : 'credits: нет данных') + '<br>' +
        (credits.period_end ? ('period end: ' + fmtDateShort(credits.period_end)) : '') +
        (a.account_type ? ('<br>account type: ' + escapeHtml(a.account_type)) : '') +
        (q.rate && q.rate.remaining_tokens != null ? ('<br>rate: ' + fmt(q.rate.remaining_tokens) + ' / ' + fmt(q.rate.limit_tokens) + ' tok') : '') +
      '</div>' +
      '<div class="details-src">источник: ' + escapeHtml(a.source || 'cpa+pg') + '</div>' +
    '</div>';

  return '<div class="pcard ' + st + '" id="' + cardId + '" data-expanded="false">' +
    '<div class="pcard-head"><span class="pcard-title">' + escapeHtml(title) + '</span>' + badge + '</div>' +
    '<div class="' + statusCls + '" style="font-size:13px;margin-bottom:4px">' + escapeHtml(statusText) + (resetLine ? ' · ' + escapeHtml(resetLine) : '') + '</div>' +
    progressBar +
    '<div class="bar-sub">' + fmt(a.success) + ' req ok · ' + fmt(a.failed) + ' fail' + '</div>' +
    (sub ? '<div class="bar-sub">' + escapeHtml(sub) + '</div>' : '') +
    '<div style="margin-top:6px">' + modelsHtml + '</div>' +
    details +
    '<div class="details-toggle" onclick="toggleDetails(\'' + cardId + '\')"></div>' +
  '</div>';
}

/* ── Stats row ── */
function renderStats(data) {
  const accounts = (data.accounts || []).filter(function(a) {
    return a.provider !== 'deepseek' && a.provider !== 'openrouter' && a.provider !== 'zai';
  });
  const wallets = data.wallets || {};
  const allItems = accounts.slice();
  if (wallets.zai) allItems.push(wallets.zai);
  if (wallets.deepseek) allItems.push(wallets.deepseek);
  if (wallets.openrouter) allItems.push(wallets.openrouter);

  let active = 0, attention = 0, blocked = 0;
  allItems.forEach(function(item) {
    const st = classify(item);
    if (st === 'ok') active++;
    else if (st === 'warn') attention++;
    else if (st === 'critical') { attention++; blocked++; }
  });
  let tokens = 0;
  accounts.forEach(function(a) {
    if (a.tokens_total) tokens += a.tokens_total;
  });

  // Spend 24h: DeepSeek + OpenRouter
  let spendParts = [];
  const ds = wallets.deepseek || {};
  const dsSpend = ds.spend_24h || {};
  if (dsSpend.spent != null) spendParts.push('¥' + money(dsSpend.spent));
  const or = wallets.openrouter || {};
  const orSpend = or.spend_24h || {};
  if (orSpend.spent != null) spendParts.push('$' + money(orSpend.spent));
  const spendStr = spendParts.length ? spendParts.join(' + ') : '—';

  const attSub = blocked > 0
    ? (blocked + ' заблокирован' + (attention > blocked ? ' · ' + (attention - blocked) + ' лимит' : ''))
    : (attention > 0 ? attention + ' лимит' : 'всё нормально');

  const statClass = attention > 0 ? 'critical' : '';

  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-k">Расход 24ч</div><div class="stat-v">' + spendStr + '</div><div class="stat-sub">DeepSeek + OpenRouter</div></div>' +
    '<div class="stat-card"><div class="stat-k">Активных</div><div class="stat-v ok-text">' + active + '</div><div class="stat-sub">из ' + allItems.length + ' провайдеров</div></div>' +
    '<div class="stat-card ' + statClass + '"><div class="stat-k">Требует внимания</div><div class="stat-v ' + (attention > 0 ? 'bad-text' : '') + '">' + attention + '</div><div class="stat-sub">' + attSub + '</div></div>' +
    '<div class="stat-card"><div class="stat-k">Токены 24ч</div><div class="stat-v">' + fmt(tokens) + '</div><div class="stat-sub">по CPA аккаунтам</div></div>';
}

/* ── Load / Refresh ── */
async function refresh() {
  try { await fetch('/api/refresh', { method: 'POST' }); } catch(e) {}
  await load();
}
async function load() {
  try {
    const res = await fetch('/api/summary');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    document.getElementById('updated').textContent =
      'обновлено: ' + fmtDateTime(data.updated_at) + ' · авто 30с';

    const errs = data.errors || [];
    document.getElementById('errors').innerHTML = errs.map(function(e) {
      return '<div class="err">' + escapeHtml(e) + '</div>';
    }).join('');

    renderStats(data);

    const wallets = data.wallets || {};
    const providerCards = [
      renderZaiCard(wallets.zai),
      renderDeepseekCard(wallets.deepseek),
      renderOpenrouterCard(wallets.openrouter),
    ].filter(Boolean).join('');
    document.getElementById('providers').innerHTML = providerCards || '<div class="muted">Нет данных</div>';

    const cpaAccounts = (data.accounts || []).filter(function(a) {
      return a.provider !== 'deepseek' && a.provider !== 'openrouter' && a.provider !== 'zai'
        && a.email !== 'deepseek-main' && a.email !== 'openrouter-main' && a.email !== 'zai-main';
    });
    document.getElementById('accounts').innerHTML = cpaAccounts.map(renderAccountCard).join('') || '<div class="muted">Нет аккаунтов</div>';
  } catch(e) {
    document.getElementById('errors').innerHTML = '<div class="err">Ошибка загрузки: ' + escapeHtml(e.message) + '</div>';
  }
}
load();
setInterval(load, 30000);
</script>
